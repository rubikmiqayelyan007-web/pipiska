<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body{
            background-image: url("https://img.freepik.com/premium-photo/abstract-black-wall-texture-pattern-background-wide-panorama-picture-black-wall-texture-rough-background-dark-concrete-floor-old-grunge-background-with-black_263512-7296.jpg?semt=ais_hybrid");
        }
        h1{
            background-color:aliceblue;
            font-size: 30px;
            text-align: center;
        }
        
        nav button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            background-color: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background-color 0.3s;
        }

        nav button:hover {
            background-color: gray ;
        }

        nav button:active {
            transform: scale(0.98);
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }
        
        b1{
            color: aliceblue;
            font-size: 18px;
        }
        h2{
            color: aliceblue;
        }
        p{
            color: aliceblue;
        }
        
        .big-picture-wrapper {
            position: fixed;
            top: -100%; 
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(0,0,0,0.9); 
            display: flex;
            justify-content: center;
            align-items: center;
            transition: top 0.5s ease-in-out; 
            z-index: 9999;
        }

        .big-picture-wrapper.show {
            top: 0; 
        }

        .big-picture-wrapper img {
            max-width: 90%;
            max-height: 90%;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            font-size: 24px;
        }
    
</style>

    </style>
</head>
<body>
    


    <header>
        <nav>
            <button data-target="tab1"> Предстваление </button>
            <button data-target="tab2"> Про Меня </button>
            <button data-target="tab3"> бум </button>
        </nav>
    </header>
    
    <div class="tabs-container">
        <div id="tab1" class="tab active">
            <h2>Привет!</h2>
                <p>Это первая вкладка с предствалением</p>
                    <button id="showBtn">Показать картину</button>
                        <div class="big-picture-wrapper" id="picWrapper">
                    <span class="close-btn" id="closeBtn">&times;</span>
            <img src="https://grizly.club/uploads/posts/2022-12/1671044123_grizly-club-p-vse-yeralash-png-4.jpg" alt="Картина">
        </div>
        <img src="https://i.pinimg.com/736x/cd/ea/20/cdea2091fd89e2b4419573b53fa341b0.jpg" width="300px" height="300px"
        <span class="piska"><h1>Меня зовут Рубик и я просто студент второго курса по специальности программиста</h1></span>
        <b1></b1></div>
        
    
    <div id="tab2" class="tab">
        <h2>Здесь можете почитать про меня</h2>
            <img src="https://i.pinimg.com/736x/ce/94/bd/ce94bd7980a9dc35674059f3281b3841.jpg"width="300" height="300">
                <h1>Я учусь в колледже информационных технологий ITHUB!</h1>
            <b1></b1></div>
        </div>
        
        
    <div id="tab3" class="tab">
        <h2>ЕСЛИ НАЖМЕШЬ ТО БУДЕТ ЧТОТО ПЛАХОЕ</h2>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFcUZxKeYVNHFaUoIdcdX3wEs8zhUGqlevIg&s">
            <button id="changeColor">О НЭД НЕ ДЕЛАЙ ЕТОГО</button>
                <b1></b1></div>
    
    <script>
        document.querySelectorAll('button[data-target]').forEach(button => {
            button.addEventListener('click', event => {
                document.querySelectorAll('.tab').forEach(tab => {
                    console.log([tab.id, button])
                    tab.classList.toggle('active', tab.id == button.dataset.target);
                })
            })
        })
        const button = document.getElementById('changeColor')
            button.addEventListener('click', () => {
                document.body.style.backgroundImage = "url('https://i.pinimg.com/736x/d7/6b/53/d76b536a8981a4a2c246efa162ac0a1a.jpg')"
                document.body.style.backgroundRepeat = 'no-repeat';
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundAttachment = 'fixed';
                document.body.style.backgroundPosition = 'center';

    });
        const btn = document.getElementById('showBtn');
            const wrapper = document.getElementById('picWrapper');
            const close = document.getElementById('closeBtn');
            btn.addEventListener('click', () => {
                wrapper.classList.add('show');
    });
        close.addEventListener('click', () => {
            wrapper.classList.remove('show');
    });
      
    </script>
</body>
</html>
