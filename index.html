<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body{
            background-image: url("https://img.freepik.com/premium-photo/abstract-black-wall-texture-pattern-background-wide-panorama-picture-black-wall-texture-rough-background-dark-concrete-floor-old-grunge-background-with-black_263512-7296.jpg?semt=ais_hybrid");
        }
        h1{
            background-color:aliceblue;
            font-size: 30px;
            text-align: center;
        }
        
        nav button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            background-color: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background-color 0.3s;
        }

        nav button:hover {
            background-color: gray ;
        }

        nav button:active {
            transform: scale(0.98);
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }
        
        b1{
            color: aliceblue;
            font-size: 18px;
        }
        h2{
            color: aliceblue;
        }
        p{
            color: aliceblue;
        }
        
       
</style>

    </style>
</head>
<body>
    


    <header>
        <nav>
            <button data-target="tab1"> Предстваление </button>
            <button data-target="tab2"> Про Меня </button>
            <button data-target="tab3"> бум </button>
        </nav>
    </header>
    
    <div class="tabs-container">
        <div id="tab1" class="tab active">
            <h2>Привет!</h2>
                <p>Это первая вкладка с предствалением</p>
                <img src="https://i.pinimg.com/736x/cd/ea/20/cdea2091fd89e2b4419573b53fa341b0.jpg" width="300px" height="300px"
            <span class="piska"><h1>Меня зовут Рубик и я просто студент второго курса по специальности программиста</h1></span>
    <b1></b1></div>
        
    
    <div id="tab2" class="tab">
        <h2>Здесь можете почитать про меня</h2>
            <img src="https://i.pinimg.com/736x/ce/94/bd/ce94bd7980a9dc35674059f3281b3841.jpg"width="300" height="300">
                <h1>Я учусь в колледже информационных технологий ITHUB!</h1>
                <img src="https://gifs.obs.ru-moscow-1.hc.sbercloud.ru/d054b99e270a9e75805627444a6a2fd0de7247ada1761ab3de82c89a5b7382ba.webp" alt="Описание анимации">
            <b1></b1></div>
        </div>
        
        
    <div id="tab3" class="tab">
        <h2>Если нажмешь то ты писька</h2>
            <button id="changeColor">Не ножимай</button>
                <b1></b1></div>
    
    <script>
        document.querySelectorAll('button[data-target]').forEach(button => {
            button.addEventListener('click', event => {
                document.querySelectorAll('.tab').forEach(tab => {
                    console.log([tab.id, button])
                    tab.classList.toggle('active', tab.id == button.dataset.target);
                })
            })
        })
        const button = document.getElementById('changeColor')
            button.addEventListener('click', () => {
                document.body.style.backgroundImage = "url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBKcnAbidKJRhb9M-ktlV1jAwDbzETADGSKw&s')"
                document.body.style.backgroundSize = "2600px 1400px";
    });
    </script>
</body>
</html>
