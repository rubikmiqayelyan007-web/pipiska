<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body{
            background-image: url("https://img.freepik.com/premium-photo/abstract-black-wall-texture-pattern-background-wide-panorama-picture-black-wall-texture-rough-background-dark-concrete-floor-old-grunge-background-with-black_263512-7296.jpg?semt=ais_hybrid");
        }
        h1{
            background-color:aliceblue;
            font-size: 30px;
            text-align: center;
        }
        
        nav button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            background-color: black;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            transition: background-color 0.3s;
        }

        nav button:hover {
            background-color: gray ;
        }

        nav button:active {
            transform: scale(0.98);
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }
        
        b1{
            color: aliceblue;
            font-size: 18px;
        }
        h2{
            color: aliceblue;
        }
        p{
            color: aliceblue;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <button data-target="tab1"> 1 </button>
            <button data-target="tab2"> 2 </button>
        </nav>
    </header>
    
    <div class="tabs-container">
        <div id="tab1" class="tab active">
            <h2>Привет!</h2>
                <p>Это первая вкладка с предствалением</p>
                <img src="https://i.pinimg.com/736x/cd/ea/20/cdea2091fd89e2b4419573b53fa341b0.jpg"
 width="300px" height="300px"
            <span class="piska"><h1>Меня зовут Рубик и я просто студент второго курса по специальности программиста</h1></span>
    <b1> </b1></div>
        
    <div id="tab2" class="tab">
        <h2>А здесь можете почитать про меня</h2>
            <img src="https://i.pinimg.com/736x/ce/94/bd/ce94bd7980a9dc35674059f3281b3841.jpg"
 width="300" height="300">
                <h1>Я учусь в колледже информационных технологий ITHUB!</h1>
            <b1></b1></div>
        </div>
    
    <script>
        document.querySelectorAll('button[data-target]').forEach(button => {
            button.addEventListener('click', event => {
                document.querySelectorAll('.tab').forEach(tab => {
                    console.log([tab.id
, button])
                    tab.classList.toggle('active', tab.id
 == button.dataset.target
);
                })
            })
        })
    </script>
</body>
</html>
